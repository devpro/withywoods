trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md

pr:
  autoCancel: true
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md

schedules:
  - cron: "0 0 * * *"
    displayName: "Daily midnight build"
    branches:
      include:
        - main
    always: true

variables:
  # library variable groups
  - group: "build-tools"
  # common task variables
  - name: "dotnet.sdk.version"
    value: "10.0.x"
  - name: "BuildConfiguration"
    value: "Debug"
  - name: "SolutionFile"
    value: "Withywoods.sln"
  - name: "TestProjects"
    value: "test/*Tests/*.csproj"
  - name: "UnitTestProjects"
    value: "test/*UnitTests/*.csproj"
  - name: "TestRunSettings"
    value: "CodeCoverage.runsettings"
  # tool variables (Sonar)
  - name: "sonar.project.name"
    value: "Withywoods"
  - name: "sonar.project.key"
    value: "withywoods"

# Unit testing
stages:
  - stage: "unit_testing"
    displayName: "Unit testing"
    jobs:
      - job: "linux_unittests"
        displayName: "Unit tests run on Linux"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UseDotNet@2
            displayName: "Use .NET Core SDK"
            inputs:
              packageType: "sdk"
              version: $(dotnet.sdk.version)
          - task: DotNetCoreCLI@2
            displayName: "Build the .NET solution"
            inputs:
              command: "build"
              projects: "$(SolutionFile)"
              arguments: "-c $(BuildConfiguration)"
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
              COREHOST_TRACE: 0
          - task: DotNetCoreCLI@2
            displayName: "Run the .NET unit tests"
            inputs:
              command: "test"
              projects: "$(UnitTestProjects)"
              arguments: "--configuration $(BuildConfiguration)"
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
              COREHOST_TRACE: 0
  # Integration testing
  - stage: "integration_testing"
    displayName: "Integration testing"
    dependsOn: []
    jobs:
      - job: "windows_integrationtests"
        displayName: "Windows CI"
        pool:
          vmImage: "windows-latest"
        steps:
          - task: UseDotNet@2
            displayName: "Use .NET Core SDK"
            inputs:
              packageType: "sdk"
              version: $(dotnet.sdk.version)
          - task: DotNetCoreCLI@2
            displayName: "Restore .NET packages"
            inputs:
              command: "restore"
              projects: "$(SolutionFile)"
              feedsToUse: "select"
              noCache: $(dotnet.cache.disable)
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
              COREHOST_TRACE: 0
          - task: DotNetCoreCLI@2
            displayName: "Build the .NET solution"
            inputs:
              command: "build"
              projects: $(SolutionFile)
              arguments: "-c $(BuildConfiguration)"
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
              COREHOST_TRACE: 0
          - task: DotNetCoreCLI@2
            displayName: "Run all tests on .NET projects"
            inputs:
              command: "test"
              projects: $(TestProjects)
              arguments: '--configuration $(BuildConfiguration) --report-xunit-trx --coverage --coverage-output-format cobertura'
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
              COREHOST_TRACE: 0
          - task: CopyFiles@2
            displayName: "Copy screenshots"
            condition: failed()
            inputs:
              Contents: "**/screenshot*.png"
              TargetFolder: "$(Build.ArtifactStagingDirectory)"
              flattenFolders: true
          - task: PublishBuildArtifacts@1
            displayName: "Publish artifacts"
            condition: failed()
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "drop"
              publishLocation: "Container"
